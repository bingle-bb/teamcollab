<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="styles.css" />
    <title>Modern Design</title>
  </head>
  <body>
    <div class="container">
      <div class="left">
        <h2>What is Area Calculation?</h2>
        <p>Area calculation helps measure the surface covered by a shape.</p>
        <h3>Common Formulas</h3>
        <ul>
          <li>Circle: π × r²</li>
          <li>Triangle: ½ × base × height</li>
        </ul>
        <p>Select a shape to begin calculating its area!</p>
      </div>

      <div class="right">
        <h1>Area Calculator</h1>
        <p>Choose A Shape</p>
        <div class="custom-dropdown">
          <div
            style="color: aquamarine !important"
            class="selected"
            id="selectedOption"
            onclick="toggleDropdown()"
          >
            Shape
          </div>
          <div class="dropdown hidden" id="dropdownMenu">
            <div onclick="selectShape('circle')">Circle</div>
            <div onclick="selectShape('triangle')">Triangle</div>
          </div>
        </div>

        <!-- Circle Form -->
        <div id="circleForm" class="hidden">
          <label for="circleRadius">Radius</label>
          <input type="number" id="circleRadius" placeholder="Enter radius" />
          <button onclick="calculateCircleArea()">Calculate Circle Area</button>
          <button onclick="clearCircleForm()">Clear</button>
          <p id="circleResult"></p>
        </div>

        <!-- Triangle Form -->
        <div id="triangleForm" class="hidden">
          <label for="triangleBase">Base</label>
          <input type="number" id="triangleBase" placeholder="Enter base" />
          <label for="triangleHeight">Height</label>
          <input type="number" id="triangleHeight" placeholder="Enter height" />
          <button onclick="calculateTriangleArea()">
            Calculate Triangle Area
          </button>
          <button onclick="clearTriangleForm()">Clear</button>
          <p id="triangleResult"></p>
        </div>
      </div>
    </div>

    <script>
      function toggleDropdown() {
        const dropdown = document.getElementById("dropdownMenu");
        dropdown.classList.toggle("hidden");
      }

      function selectShape(shape) {
        document.getElementById("selectedOption").textContent =
          shape.charAt(0).toUpperCase() + shape.slice(1);
        document.getElementById("dropdownMenu").classList.add("hidden");

        document.getElementById("circleForm").classList.add("hidden");
        document.getElementById("triangleForm").classList.add("hidden");

        if (shape === "circle") {
          document.getElementById("circleForm").classList.remove("hidden");
        } else if (shape === "triangle") {
          document.getElementById("triangleForm").classList.remove("hidden");
        }
      }

      function getCircleArea(radius) {
        return Math.PI * radius * radius;
      }

      function calculateCircleArea() {
        const radius = parseFloat(
          document.getElementById("circleRadius").value
        );
        if (isNaN(radius) || radius <= 0) {
          document.getElementById("circleResult").textContent =
            "Please enter a valid radius.";
          return;
        }
        const area = getCircleArea(radius);
        document.getElementById(
          "circleResult"
        ).textContent = `Area of Circle = ${area.toFixed(2)} square units.`;
      }

      function getTriangleArea(base, height) {
        return 0.5 * base * height;
      }

      function calculateTriangleArea() {
        const base = parseFloat(document.getElementById("triangleBase").value);
        const height = parseFloat(
          document.getElementById("triangleHeight").value
        );

        if (isNaN(base) || isNaN(height) || base <= 0 || height <= 0) {
          document.getElementById("triangleResult").textContent =
            "Please enter valid base and height.";
          return;
        }

        const area = getTriangleArea(base, height);
        document.getElementById(
          "triangleResult"
        ).textContent = `Area of Triangle = ${area.toFixed(2)} square units.`;
      }

      function clearCircleForm() {
        document.getElementById("circleRadius").value = "";
        document.getElementById("circleResult").textContent = "";
      }

      function clearTriangleForm() {
        document.getElementById("triangleBase").value = "";
        document.getElementById("triangleHeight").value = "";
        document.getElementById("triangleResult").textContent = "";
      }
    </script>
  </body>
</html>
